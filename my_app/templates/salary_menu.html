
<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oylik Menyusi | TemirYo'l</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            background: #000; color: white; overflow: hidden;
        }

        /* VIDEO FON */
        #bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .menu-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px 30px;
            border-radius: 35px;
            text-align: center;
            width: 90%; max-width: 380px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative; z-index: 1;
        }

        h1 {
            color: #fff; text-transform: uppercase;
            font-size: 22px; margin-bottom: 10px;
            letter-spacing: 2px; font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .razryad-tag {
            display: inline-block;
            padding: 6px 18px;
            background: rgba(0, 242, 255, 0.2);
            border: 1px solid #00f2ff;
            border-radius: 12px;
            color: #00f2ff;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .nav-link {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 18px; margin: 15px 0;
            background: #00f2ff; color: #000;
            text-decoration: none; border-radius: 18px;
            font-weight: 900; transition: 0.3s;
            text-transform: uppercase;
            font-size: 14px;
        }

        .nav-link:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.5);
        }

        .nav-manual {
            background: transparent;
            border: 2px solid #ff9d00;
            color: #ff9d00;
        }

        .nav-manual:hover {
            background: #ff9d00;
            color: #000;
        }

        .back-link {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
            margin-top: 25px;
            transition: 0.3s;
        }
        .back-link:hover { color: #00f2ff; }
    </style>
</head>
<body>
    <video loop playsinline id="bg-video">
        <source src="{{ video_url }}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="menu-box">
        <i class="fas fa-calculator" style="font-size: 45px; color: #00f2ff; margin-bottom: 15px;"></i>
        <h1>Oylik Hisoblash</h1>
        <div class="razryad-tag">Sizning razryadingiz: {{ user.razryad }}</div>

        <a href="{{ auto_url }}" class="nav-link">
            <i class="fas fa-robot"></i> Avtomatik hisob
        </a>

        <a href="/Kankulyator/" class="nav-link nav-manual">
            <i class="fas fa-edit"></i> Qo'lda kiritish
        </a>

        <a href="/second/" class="back-link"><i class="fas fa-arrow-left"></i> ORQAGA QAYTISH</a>
    </div>

    <script>
        const video = document.getElementById('bg-video');

        window.addEventListener('load', () => {
            video.muted = false;
            video.volume = 0.5;
            let playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    video.muted = true;
                    video.play();
                });
            }
        });

        document.body.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
                video.play();
            }
        }, { once: false });
    </script>
</body>
</html>
