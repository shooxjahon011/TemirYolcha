<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="icon" href="{% static 'icons/image.png' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'icons/image.png' %}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">

    <title>Hisobot: {{ worker.full_name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { margin: 0; padding: 0; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; }

        #bg-video {
            position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            z-index: -2; transform: translate(-50%, -50%); object-fit: cover;
            filter: brightness(0.25);
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent, rgba(0,0,0,0.8)); z-index: -1; }

        .content { padding: 25px 20px; max-width: 500px; margin: 0 auto; position: relative; z-index: 1; }

        .form-container {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px);
            padding: 30px 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        h2 { color: #00f2ff; margin-top: 0; font-size: 22px; display: flex; align-items: center; gap: 10px; }

        .worker-meta {
            background: rgba(0, 242, 255, 0.1); padding: 12px; border-radius: 12px;
            margin-bottom: 25px; border-left: 3px solid #00f2ff;
        }

        label { display:block; margin-top:18px; color:#00f2ff; font-size:11px; font-weight:900; text-transform: uppercase; letter-spacing: 1px; }

        input {
            width: 100%; padding: 14px; margin-top: 8px;
            background: rgba(255,255,255,0.95); border: none;
            color: #000; border-radius: 12px; box-sizing: border-box;
            font-weight: 700; outline: none; transition: 0.3s;
            font-size: 16px; /* Mobil qurilmalarda avto-zoom bo'lmasligi uchun kamida 16px */
        }
        input:focus { box-shadow: 0 0 15px rgba(0, 242, 255, 0.5); transform: translateY(-2px); }

        button {
            width: 100%; padding: 18px; background: linear-gradient(135deg, #00f2ff, #0072ff);
            border:none; border-radius: 15px; font-weight:900; cursor:pointer;
            margin-top:35px; font-size:15px; color:white; text-transform: uppercase;
            letter-spacing: 1.5px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }
        button:active { transform: scale(0.97); }

        .back-link {
            color: white; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
            margin-bottom: 25px; background: rgba(255,255,255,0.08);
            padding: 12px 18px; border-radius: 12px; font-size: 13px; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .back-link:hover { background: rgba(255,255,255,0.15); }

        .error-msg {
            background: rgba(255, 71, 71, 0.15); border: 1px solid #ff4747;
            padding: 12px; border-radius: 12px; margin-bottom: 20px;
            color: #ff4747; font-size: 14px; font-weight: 600;
        }
    </style>
</head>
<body>
    <video autoplay loop playsinline muted id="bg-video">
        <source src="{{ video_url }}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="content">
        <a href="/kunlik/" class="back-link"><i class="fas fa-arrow-left"></i> ORQAGA QAYTISH</a>

        <div class="form-container">
            <h2><i class="fas fa-file-invoice"></i> Hisobot kiritish</h2>

            <div class="worker-meta">
                <div style="color:#fff; font-size: 16px; font-weight: 700;">{{ worker.full_name }}</div>
                <div style="color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 4px;">
                    Tabel: <span style="color:#00f2ff">{{ worker.tabel_raqami }}</span>
                </div>
            </div>

            {% if error %}
                <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <label>Ish kuni sanasi:</label>
                <input type="date" name="sana" required value="{{ today_date }}">

                <label>Norma soati (reja):</label>
                <input type="number" name="norma" step="0.1" required placeholder="Masalan: 8.0">

                <label>Oklad (stavka miqdori):</label>
                <input type="number" name="oklad" required placeholder="0">

                <label>Haqiqiy ishlangan soat:</label>
                <input type="number" name="ishlagan" step="0.1" required placeholder="Masalan: 8.0">

                <label>Tungi vaqt soati:</label>
                <input type="number" name="tungi" step="0.1" value="0" placeholder="0.0">

                <label>Bayram/Dam olish soati:</label>
                <input type="number" name="bayram" step="0.1" value="0" placeholder="0.0">

                <button type="submit">TASDIQLASH VA YUKLASH</button>
            </form>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW faol (Hisobot sahifasi)'))
                    .catch(err => console.log('SW xatosi:', err));
            });
        }
    </script>
</body>
</html>
