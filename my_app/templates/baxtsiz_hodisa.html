<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="icon" href="{% static 'icons/image.png' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'icons/image.png' %}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3c0000">

    <title>Monitoring | TemirYo'l</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { margin: 0; padding: 0; color: white; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; background: #000; cursor: pointer; }
        #bg-video { position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; pointer-events: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(20,0,0,0.9)); z-index: -1; }

        .header {
            background: rgba(60, 0, 0, 0.95); padding: 15px 20px;
            text-align: center; border-bottom: 2px solid #ff4b4b;
            position: sticky; top: 0; z-index: 10; backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 15px rgba(255, 75, 75, 0.2);
        }
        .header-title { flex-grow: 1; text-align: center; font-weight: 900; color: #ff4b4b; letter-spacing: 1.5px; text-transform: uppercase; font-size: 16px; }

        .content { padding: 25px 15px; max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }

        /* ADMIN PANEL */
        .admin-box {
            background: rgba(45, 0, 0, 0.4); padding: 25px; border-radius: 25px;
            margin-bottom: 35px; border: 1px solid rgba(255, 75, 75, 0.3);
            backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        textarea {
            width: 100%; height: 120px; background: rgba(0,0,0,0.7);
            color: white; border-radius: 15px; padding: 15px;
            border: 1px solid rgba(255,255,255,0.1); outline: none;
            resize: none; font-size: 15px; font-family: inherit;
            box-sizing: border-box; transition: 0.3s;
        }
        textarea:focus { border-color: #ff4b4b; box-shadow: 0 0 10px rgba(255, 75, 75, 0.2); }

        .file-label {
            background: rgba(255,255,255,0.05); padding: 12px 18px;
            border-radius: 12px; font-size: 13px; cursor: pointer;
            border: 1px dashed rgba(255,255,255,0.3); transition: 0.3s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .file-label:hover { background: rgba(255,255,255,0.1); border-color: #ff4b4b; }

        /* CARD DESIGN */
        .msg-card {
            background: rgba(40, 0, 0, 0.4); border-left: 4px solid #ff4b4b;
            padding: 20px; border-radius: 20px; margin-bottom: 20px;
            backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.05);
            animation: slideIn 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .msg-header { color: #ff4b4b; font-weight: 800; font-size: 11px; margin-bottom: 12px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; letter-spacing: 1px; }
        .msg-body { white-space: pre-wrap; line-height: 1.6; font-size: 15px; color: #f0f0f0; }
        .msg-footer { text-align: right; font-size: 10px; opacity: 0.4; margin-top: 18px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); font-style: italic; }

        .btn {
            background: linear-gradient(45deg, #ff4b4b, #a30000); color: white;
            border: none; padding: 14px 35px; border-radius: 15px;
            cursor: pointer; font-weight: 900; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255, 75, 75, 0.3);
        }
        .btn:active { transform: scale(0.95); }

        .empty-state { text-align: center; opacity: 0.4; margin-top: 60px; font-size: 14px; }
    </style>
</head>
<body>
    <video loop playsinline id="bg-video">
        <source src="{{ video_url }}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="header">
        <a href="/second/" style="color:white; font-size: 20px; padding: 5px;"><i class="fas fa-arrow-left"></i></a>
        <div class="header-title">Monitoring tizimi</div>
        <div style="width: 30px;"></div>
    </div>

    <div class="content">
        {% if is_boss %}
        <div class="admin-box">
            <h3 style="margin-top:0; color:#ff4b4b; font-size:15px; display:flex; align-items:center; gap:8px;">
                <i class="fas fa-user-shield"></i> BOSS BOSHQARUVI
            </h3>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <textarea name="text" placeholder="Xodimlar uchun rasmiy bildirishnoma matnini kiriting..." required></textarea>
                <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap:12px;">
                    <label class="file-label">
                        <i class="fas fa-paperclip"></i> Hujjat biriktirish
                        <input type="file" name="admin_file" accept=".pdf,.docx,.xlsx" style="display:none;">
                    </label>
                    <button type="submit" class="btn">Yuborish</button>
                </div>
            </form>
        </div>
        {% endif %}

        {% for msg in messages %}
        <div class="msg-card">
            <div class="msg-header"><i class="fas fa-bullhorn"></i> RASMIY BILDIRISHNOMA</div>
            <div class="msg-body">{{ msg.text }}</div>
            <div class="msg-footer">Yuborilgan vaqt: {{ msg.time }}</div>
        </div>
        {% empty %}
        <div class="empty-state">
            <i class="fas fa-ghost" style="font-size: 40px; margin-bottom: 10px; display: block;"></i>
            Hozircha hech qanday bildirishnomalar mavjud emas.
        </div>
        {% endfor %}
    </div>

    <script>
        const video = document.getElementById('bg-video');

        // PWA uchun Service Worker ro'yxatdan o'tkazish
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Monitoring SW faol'))
                    .catch(err => console.log('SW xatosi:', err));
            });
        }

        function enableAudio() {
            video.muted = false;
            video.volume = 0.6;
            video.play().catch(e => console.log("Ovoz yoqilmadi"));
        }

        document.body.addEventListener('click', enableAudio, { once: true });
        document.body.addEventListener('touchstart', enableAudio, { once: true });

        window.onload = () => {
            video.muted = true;
            video.play();
        };
    </script>
</body>
</html>
