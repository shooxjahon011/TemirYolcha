
<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivlashtirish | TemirYo'l</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; height: 100vh; display: flex;
            justify-content: center; align-items: center;
            background: #000; font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #bg-video {
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%;
            z-index: -2; object-fit: cover; filter: brightness(0.4);
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); z-index: -1;
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(25px);
            padding: 40px 30px;
            border-radius: 40px;
            width: 90%; max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
        }

        .bot-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #0088cc; color: white; padding: 16px;
            border-radius: 20px; text-decoration: none;
            margin-bottom: 25px; font-weight: bold;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3);
        }
        .bot-btn:hover { transform: translateY(-2px); background: #0099e6; }

        input {
            width: 100%; padding: 18px; border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.1); color: #00f2ff;
            margin-bottom: 20px; text-align: center; font-size: 26px;
            letter-spacing: 10px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #00f2ff; background: rgba(255,255,255,0.15); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        input::placeholder { letter-spacing: normal; font-size: 14px; color: rgba(255,255,255,0.3); text-transform: uppercase; }

        .submit-btn {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, #00f2ff, #0072ff);
            color: #fff; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            transition: 0.4s;
        }
        .submit-btn:hover { transform: scale(1.03); box-shadow: 0 10px 25px rgba(0, 242, 255, 0.5); }

        .error-msg { background: rgba(255, 71, 71, 0.2); color: #ff4747; padding: 15px; border-radius: 15px; margin-bottom: 20px; font-size: 14px; font-weight: bold; border: 1px solid rgba(255, 71, 71, 0.4); }
        .info { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 25px; line-height: 1.6; }
        h3 { margin: 15px 0; font-size: 24px; font-weight: 800; text-transform: uppercase; color: #00f2ff; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="{{ video_url }}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="card">
        <i class="fas fa-user-shield" style="font-size: 60px; color: #00f2ff; filter: drop-shadow(0 0 15px #00f2ff);"></i>
        <h3>TASDIQLASH</h3>
        <p class="info">Profilni faollashtirish uchun Telegram botimiz orqali yuborilgan 6 xonali kodni kiriting.</p>

        {% if error %}
            <div class="error-msg"><i class="fas fa-times-circle"></i> {{ error }}</div>
        {% endif %}

        <a href="https://t.me/ReGiStRaTsIyATY_bot" class="bot-btn" target="_blank">
            <i class="fab fa-telegram-plane"></i> BOTDAN KOD OLISH
        </a>

        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="login" value="{{ login_val }}">
            <input type="text" name="activation_code" placeholder="KODNI KIRITING" required maxlength="6" autocomplete="off">
            <button type="submit" class="submit-btn">FAOLLASHTIRISH</button>
        </form>

        <div style="margin-top: 25px; font-size: 13px;">
            Foydalanuvchi: <span style="color: #00f2ff; font-weight: bold;">{{ login_val }}</span>
        </div>
    </div>
</body>
</html>
