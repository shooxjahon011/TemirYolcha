
<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | TemirYo'l</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: {{ color }}; } /* Dinamik rang */

        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; overflow-x: hidden; }

        /* Video fon */
        #bg-video { position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; opacity: 0.6; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: -1; }

        .box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 380px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h2 { color: var(--main-color); text-align: center; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }

        label { font-size: 10px; color: var(--main-color); text-transform: uppercase; margin-left: 5px; font-weight: bold; display: block; margin-top: 10px; }

        input {
            width: 100%; padding: 12px; margin: 5px 0;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.9); color: #000;
            box-sizing: border-box; font-weight: 600; outline: none;
        }
        input:focus { border-color: var(--main-color); box-shadow: 0 0 10px var(--main-color); }

        button {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: var(--main-color); color: #000; font-weight: 900;
            cursor: pointer; margin-top: 20px; transition: 0.3s; text-transform: uppercase;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px var(--main-color); }

        .res-box {
            background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px;
            text-align: center; margin-bottom: 20px; border-left: 4px solid var(--main-color);
        }
        .netto-val { font-size: 24px; color: var(--main-color); font-weight: 800; }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline id="bg-video">
        <source src="{{ video_url }}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="box">
        <a href="/second/" style="color:#888; text-decoration:none; font-size: 12px;"><i class="fas fa-arrow-left"></i> ORQAGA</a>
        <h2>{{ title }}</h2>

        {% if error %}
            <p style="color: #ff4b4b; text-align: center; font-size: 13px;">⚠️ {{ error }}</p>
        {% endif %}

        {% if netto %}
            <div class="res-box">
                <span style="font-size: 12px; opacity: 0.8;">SOF OYLIK:</span><br>
                <span class="netto-val">{{ netto|floatformat:0 }} so'm</span>
            </div>
        {% endif %}

        <form method="GET">
            <label>Oklad:</label>
            <input type="number" name="salary" value="{{ salary }}" required>

            <label>Norma soat:</label>
            <input type="number" name="norma_soat" value="{{ norma_soat }}" required>

            <label>Ishlangan soat:</label>
            <input type="number" name="ishlangan_soat" value="{{ ishlangan_soat }}" required>

            {% if is_manual %}
                <label>Mukofot foizi (%):</label>
                <input type="number" name="bonus_percent" value="{{ bonus_percent }}" required>
            {% endif %}

            <label>Tungi soat:</label>
            <input type="number" name="tungi_soat" value="{{ tungi_soat|default:0 }}">

            <label>Bayram soati:</label>
            <input type="number" name="bayram_soati" value="{{ bayram_soati|default:0 }}">

            <button type="submit">HISOBLASH</button>
        </form>
    </div>
</body>
</html>
